    <style>
      #coming-soon-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        backdrop-filter: blur(8px);
        background: rgba(0, 0, 0, 0.4);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 9999;
      }

      .coming-soon-content {
        color: white;
        font-size: 3rem;
        font-weight: bold;
        text-align: center;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <div id="coming-soon-overlay" onclick="closeComingSoon()">
      <div class="coming-soon-content">
        <h1>¡Próximamente!</h1>
      </div>
    </div>

    <script>
      document.addEventListener("click", function(e) {
        const target = e.target.closest("a, button");
        if (!target) return;

        const text = (target.innerText || "").toLowerCase();

        const triggers = [
          "explorar fincas",
          "ver fincas",
          "explore verified farms",
          "view farms"
        ];

        const match = triggers.some(t => text.includes(t));

        if (match) {
          e.preventDefault();

          const overlay = document.getElementById("coming-soon-overlay");

          // idioma automático
          if (text.includes("explore") || text.includes("view")) {
            overlay.querySelector("h1").innerText = "Coming Soon!";
          } else {
            overlay.querySelector("h1").innerText = "¡Próximamente!";
          }

          overlay.style.display = "flex";
        }
      });

      function closeComingSoon() {
        document.getElementById("coming-soon-overlay").style.display = "none";
        window.location.href = "./";
      }
    </script>
    <script>
function forceSpanish() {
  const userLang = navigator.language || navigator.userLanguage;

  // Solo actuar si navegador está en español
  if (!userLang.toLowerCase().startsWith("es")) return;

  // Detectar si la página está en inglés
  const pageText = document.body.innerText.toLowerCase();

  const isEnglish =
    pageText.includes("explore") ||
    pageText.includes("verified farms") ||
    pageText.includes("view farms");

  if (!isEnglish) return true; // ya está en español

  // Buscar el botón toggle (el que tiene EN | ES)
  const buttons = document.querySelectorAll("button");

  let clicked = false;

  buttons.forEach(btn => {
    const text = (btn.innerText || "").toUpperCase();

    if (text.includes("EN") && text.includes("ES")) {
      btn.click(); // 🔥 CAMBIA IDIOMA
      clicked = true;
    }
  });

  return clicked;
}

// 🔁 intentar varias veces hasta que React cargue
let attempts = 0;
const interval = setInterval(() => {
  const success = forceSpanish();

  attempts++;

  if (success || attempts > 15) {
    clearInterval(interval);
  }
}, 500);
</script>
