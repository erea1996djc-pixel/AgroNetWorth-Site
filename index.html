    <style>
      #coming-soon-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        backdrop-filter: blur(8px);
        background: rgba(0, 0, 0, 0.4);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 9999;
      }

      .coming-soon-content {
        color: white;
        font-size: 3rem;
        font-weight: bold;
        text-align: center;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <div id="coming-soon-overlay" onclick="closeComingSoon()">
      <div class="coming-soon-content">
        <h1>¡Próximamente!</h1>
      </div>
    </div>

    <script>
      document.addEventListener("click", function(e) {
        const target = e.target.closest("a, button");
        if (!target) return;

        const text = (target.innerText || "").toLowerCase();

        const triggers = [
          "explorar fincas",
          "ver fincas",
          "explore verified farms",
          "view farms"
        ];

        const match = triggers.some(t => text.includes(t));

        if (match) {
          e.preventDefault();

          const overlay = document.getElementById("coming-soon-overlay");

          // idioma automático
          if (text.includes("explore") || text.includes("view")) {
            overlay.querySelector("h1").innerText = "COMING SOON!";
          } else {
            overlay.querySelector("h1").innerText = "¡Próximamente!";
          }

          overlay.style.display = "flex";
        }
      });

      function closeComingSoon() {
        document.getElementById("coming-soon-overlay").style.display = "none";
        window.location.href = "./";
      }
    </script>
    <script>
window.addEventListener("load", function() {
  // Espera a que React cargue
  setTimeout(() => {
    const buttons = document.querySelectorAll("button, a");

    buttons.forEach(btn => {
      const text = (btn.innerText || "").toLowerCase();

      // Detecta botón de idioma inglés → lo cambia a español
      if (text.includes("english")) {
        // Busca opción Spanish y hace click
        buttons.forEach(b => {
          const t = (b.innerText || "").toLowerCase();
          if (t.includes("español") || t.includes("spanish")) {
            b.click();
          }
        });
      }
    });
  }, 1000); // espera 1 segundo a que cargue todo
});
</script>
  </body>
</html>
